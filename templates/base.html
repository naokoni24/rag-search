<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>社内ナレッジ検索</title>
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
  <link rel="icon" href="{{ url_for('static', filename='favicon-32.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css', v=style_version) }}">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/htmx/1.9.12/htmx.min.js"></script>
</head>
<body>
  <div class="shell-bg"></div>
  <div class="header">
    <div class="header-inner">
      <div class="header-logo">
        <div class="header-logo-icon">
          <svg width="22" height="22" fill="none" stroke="#ffffff" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
          </svg>
        </div>
        <div>
          <p class="header-brand-label">SAMPLE CO., LTD.</p>
          <p class="header-brand-name">KnowledgeAI</p>
        </div>
      </div>
      <div class="header-title-block">
        <p class="header-title">社内ナレッジ検索システム</p>
        <p class="header-subtitle">社内文書をAIで即座に検索・回答</p>
      </div>
      <div class="header-right">
        {% if is_admin_header %}
        <form method="post" action="{{ url_for('manage_logout') }}" class="logout-form">
          <button type="submit" class="logout-link">ログアウト</button>
        </form>
        {% endif %}
      </div>
    </div>
  </div>

  <div class="container">
    <nav class="tabs">
      <a href="{{ url_for('index') }}" class="tab {{ 'tab-active' if active_tab == 'search' else '' }}">文書を検索</a>
      <a href="{{ url_for('manage') }}" class="tab {{ 'tab-active' if active_tab == 'manage' else '' }}">文書を管理</a>
    </nav>

    {% block content %}{% endblock %}
  </div>
</body>
</html>
